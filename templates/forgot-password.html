{% extends "base.html" %}

{% block title %}Forgot Password — GigPitch{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-1 text-center">
                    <i class="bi bi-shield-lock" style="color: var(--color-brand);"></i> Reset your password
                </h4>
                <p class="text-muted text-center small mb-4">Enter your email and we'll send you a one-time code.</p>

                <form method="post" action="{{ url_for('forgot_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            required
                            autofocus
                        >
                    </div>
                    <button type="submit" class="btn btn-success w-100">Send OTP</button>
                </form>

                <hr>
                <p class="text-center mb-0 small">
                    <a href="{{ url_for('login') }}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
