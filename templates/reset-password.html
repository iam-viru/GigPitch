{% extends "base.html" %}

{% block title %}Set New Password — GigPitch{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-1 text-center">
                    <i class="bi bi-key" style="color: var(--color-brand);"></i> Set a new password
                </h4>
                <p class="text-muted text-center small mb-4">Choose a strong password — at least 8 characters.</p>

                <form method="post" action="{{ url_for('reset_password') }}">
                    <div class="mb-3">
                        <label for="password" class="form-label">New password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            minlength="8"
                            required
                            autofocus
                        >
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm new password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="confirm_password"
                            name="confirm_password"
                            minlength="8"
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-success w-100">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
