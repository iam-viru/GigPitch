{% extends "base.html" %}

{% block title %}Enter OTP — GigPitch{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-1 text-center">
                    <i class="bi bi-envelope-check" style="color: var(--color-brand);"></i> Check your email
                </h4>
                <p class="text-muted text-center small mb-4">
                    We sent a 6-digit code to
                    <strong>{{ email[:3] }}***@{{ email.split('@')[1] if '@' in email else '...' }}</strong>.
                    It expires in 15 minutes.
                </p>

                <form method="post" action="{{ url_for('verify_otp') }}">
                    <div class="mb-4">
                        <label for="otp" class="form-label">One-time code</label>
                        <input
                            type="text"
                            class="form-control form-control-lg text-center fw-bold"
                            id="otp"
                            name="otp"
                            maxlength="6"
                            pattern="\d{6}"
                            placeholder="000000"
                            inputmode="numeric"
                            autocomplete="one-time-code"
                            required
                            autofocus
                        >
                    </div>
                    <button type="submit" class="btn btn-success w-100">Verify OTP</button>
                </form>

                <hr>
                <p class="text-center mb-0 small">
                    Didn't receive it? <a href="{{ url_for('forgot_password') }}">Request a new code</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
